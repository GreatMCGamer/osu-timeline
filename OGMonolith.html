<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>osu! Live Note Timeline</title>
    <style>
        body { margin:0; background:transparent; overflow:hidden; font-family:Arial; }
        canvas { display:block; background:transparent; }
    </style>
</head>
<body>
    <canvas id="c" width="3840" height="300"></canvas>

<script> // Authors: GreatMCGamer, Grok 4.2, Gemini 3.1 pro, Qwen3 coder 30b
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // ──────── USER CONFIG ────────
    const SPEED_MULTIPLIER = 1.0;
    let scale = 0.6;
    let playheadX = 2669;

    const COLORIZE_SLIDER_BODY = false; 
    let useBeatmapCombos = true;
    const TEXTURE_SCALE = 0.4;
    const SPINNER_BAR_HEIGHT = 40;

    const TARGET_FPS = 480;
    const SHOW_DEBUG_PANEL = false;

    // ──────── KEYPRESS VISUALIZATION CONFIG ────────
    const KEY_LINE_THICKNESS = 20;
    const KEY_BOX_SIZE = 24;
    const KEY_BOX_Y = 25;         // Y position of the first lane (k1/m1)
    const KEY_BOX_SPACING = 30;   // Vertical space between lane 1 and lane 2
    
    const KEY_BOX_Y_CENTERED = canvas.height / 2;

    const TITLE_FONT_SIZE = 50;

    // Align all elements with KEY_BOX_Y_CENTERED
    const CIRCLE_Y = KEY_BOX_Y_CENTERED;
    const SLIDER_Y = KEY_BOX_Y_CENTERED;
    const SPINNER_Y = KEY_BOX_Y_CENTERED;
    const PLAYHEAD_Y_START = KEY_BOX_Y_CENTERED - 45;
    const PLAYHEAD_Y_END = KEY_BOX_Y_CENTERED + 45;
    const TITLE_Y = KEY_BOX_Y_CENTERED - 20;

    const sliderBuffer = document.createElement('canvas');
    const sctx = sliderBuffer.getContext('2d');

    let wsCommon;
    let wsPrecise;

    let hitObjects = [];
    let timingPoints = [];
    let beatmapComboColors = [];
    let beatmapOD = 8.0;
    let beatmapSliderTickRate = 1.0;
    let lastChecksum = '';
    let mapTitle = 'Waiting for map...';

    let sliderTrackOverride = [20, 20, 20];
    let sliderBorder = [255, 255, 255];
    let sliderStyle = 2;

    let gameStateName = 'Menu';
    let lastReceiveTime = performance.now();

    let lastPreciseTime = 0;
    let lastPreciseRealTime = 0;
    let hitErrorCount = 0;

    let lastCommonLiveTime = 0;
    let lastCommonRealTime = 0;
    let currentSpeed = 1.0;
    let lastLiveTimeChangeReal = performance.now();
    let speedAccumTosu = 0;
    let speedAccumReal = 0;

    let isTimelineLocked = false;
    let lockedBaseTime = 0;
    let lockedBaseRealTime = 0;
    let lockedCurrentSpeed = 1.0;

    let keyStrokes = [];
    let activeStrokes = { k1: null, k2: null, m1: null, m2: null };
    let lastCounts = { k1: 0, k2: 0, m1: 0, m2: 0 };
    let keyBoxStates = { k1: false, k2: false, m1: false, m2: false };

    let hitCircleImg = null;
    let hitCircleOverlayImg = null;
    let defaultTintedHitCircles = [];
    let beatmapTintedHitCircles = [];
    let hasHitCircleTexture = false;

    let sliderTickImg = null;
    let defaultTintedSliderTicks = [];
    let beatmapTintedSliderTicks = [];
    let hasSliderTickTexture = false;

    const DEFAULT_COMBO_COLORS = [
        { r: 255, g: 192, b: 0 },
        { r: 0,   g: 202, b: 0 },
        { r: 18,  g: 124, b: 255 },
        { r: 242, g: 24,  b: 57 }
    ];

    let lastCombo = 0;
    let ourDetectedMissCount = 0;

    function getSliderStyles(trackRgb, borderRgb, isMissed = false) {
        let [r, g, b] = trackRgb;
        let border = borderRgb;
        let alpha = 0.8;
        
        if (isMissed) {
            const avg = (r + g + b) / 3;
            r = g = b = avg * 0.5;
            border = [100, 100, 100];
            alpha = 0.3;
        }

        const highlight = [Math.min(255, r + 90), Math.min(255, g + 90), Math.min(255, b + 90)];
        return {
            border: `rgb(${border.join(',')})`,
            trackBaseRgb: `${r},${g},${b}`,
            trackHighlightRgb: `${highlight.join(',')}`,
            alpha: alpha
        };
    }

    function connect() {
        if (wsCommon) wsCommon.close();
        if (wsPrecise) wsPrecise.close();

        wsCommon = new WebSocket('ws://127.0.0.1:24050/websocket/v2');
        wsCommon.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const now = performance.now();
            if (data.state?.name) gameStateName = data.state.name;
            
            if (data.beatmap) {
                mapTitle = `${data.beatmap.artist} - ${data.beatmap.title} [${data.beatmap.version || 'Unknown'}]`;
                const cs = data.beatmap.checksum;
                if (cs && cs !== lastChecksum) {
                    lastChecksum = cs;
                    resetTimelineState();
                    fetchBeatmap();
                }
                if (data.settings?.skin?.colors) {
                    if (data.settings.skin.colors.sliderTrackOverride) sliderTrackOverride = data.settings.skin.colors.sliderTrackOverride;
                    if (data.settings.skin.colors.sliderBorder) sliderBorder = data.settings.skin.colors.sliderBorder;
                }
                const liveTime = data.beatmap.time?.live;
                if (liveTime !== undefined) {
                    lastReceiveTime = now;
                    let dtTosu = 0, dtReal = 0;
                    if (lastCommonLiveTime > 0) {
                        dtTosu = liveTime - lastCommonLiveTime;
                        dtReal = now - lastCommonRealTime;
                        if (dtTosu < -500) { resetTimelineState(); dtTosu = 0; }
                    }
                    lastCommonLiveTime = liveTime;
                    lastCommonRealTime = now;
                    if (dtTosu !== 0) {
                        lastLiveTimeChangeReal = now;
                        if (currentSpeed === 0) {
                            currentSpeed = 1.0; isTimelineLocked = false;
                            speedAccumTosu = 0; speedAccumReal = 0;
                        }
                        if (dtTosu > 0 && dtTosu < 500) {
                            speedAccumTosu += dtTosu; speedAccumReal += dtReal;
                            if (speedAccumReal > 500) {
                                const raw = speedAccumTosu / speedAccumReal;
                                currentSpeed = Math.abs(raw - 0.75) < 0.15 ? 0.75 : Math.abs(raw - 1.5) < 0.15 ? 1.5 : 1.0;
                                speedAccumTosu = 0; speedAccumReal = 0;
                            }
                        } else if (dtTosu >= 500) {
                            isTimelineLocked = false; speedAccumTosu = 0; speedAccumReal = 0;
                        }
                    } else if (now - lastLiveTimeChangeReal > 250 && currentSpeed !== 0) {
                        currentSpeed = 0; isTimelineLocked = false;
                    }
                }
            }

            if (data.play && data.play.combo && typeof data.play.combo.current === 'number') {
                const currCombo = data.play.combo.current;
                if (currCombo < lastCombo && lastCombo > 0) {
                    const gameMisses = (data.play.hits && typeof data.play.hits["0"] === 'number') ? data.play.hits["0"] : 0;
                    if (gameMisses === ourDetectedMissCount) {
                        markSliderAsMissed();
                    }
                }
                lastCombo = currCombo;
            }

            if (data.currentTime !== undefined) {
                lastPreciseTime = data.currentTime;
                lastPreciseRealTime = performance.now();
            }
        };
        wsCommon.onclose = () => setTimeout(connect, 2000);

        wsPrecise = new WebSocket('ws://127.0.0.1:24050/websocket/v2/precise');
        wsPrecise.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const now = performance.now();
            const hitErrors = Array.isArray(data.hitErrors) ? data.hitErrors :
                              (Array.isArray(data.tourney) && data.tourney[0] && Array.isArray(data.tourney[0].hitErrors)) ? data.tourney[0].hitErrors : null;

            if (data.currentTime !== undefined) {
                lastPreciseTime = data.currentTime;
                lastPreciseRealTime = now;
            }
            
            if (data.keys) {
                const keys = data.keys;
                let currentLiveTime = lastPreciseTime;

                const keyNames = ['k1', 'k2', 'm1', 'm2'];
                const titleCaseNames = ['KeyK1', 'KeyK2', 'KeyM1', 'KeyM2'];

                keyNames.forEach((k, index) => {
                    let keyData = keys[k] || keys[titleCaseNames[index]];
                    if (!keyData) return;

                    let isDown = keyData.isPressed === true;
                    let kCount = keyData.count || 0;

                    if (kCount < lastCounts[k]) {
                        lastCounts[k] = kCount;
                        if (activeStrokes[k]) {
                            activeStrokes[k].endTime = currentLiveTime;
                            activeStrokes[k] = null;
                        }
                    }

                    const hasNewPress = (kCount > lastCounts[k]) || (isDown && !keyBoxStates[k]);

                    if (hasNewPress) {
                        if (activeStrokes[k]) activeStrokes[k].endTime = currentLiveTime;
                        
                        const stroke = { 
                            key: k, 
                            startTime: currentLiveTime, 
                            endTime: isDown ? null : currentLiveTime + 1,
                            matched: false
                        };
                        keyStrokes.push(stroke);
                        activeStrokes[k] = isDown ? stroke : null;
                    } else if (!isDown && activeStrokes[k]) {
                        activeStrokes[k].endTime = currentLiveTime;
                        activeStrokes[k] = null;
                    }

                    lastCounts[k] = kCount;
                    keyBoxStates[k] = isDown;
                });
            }
            
            if (hitErrors) {
            const newCount = hitErrors.length;
            if (newCount < hitErrorCount) {
                hitErrorCount = newCount; isTimelineLocked = false;
                if (hitObjects) hitObjects.forEach(h => { h.judged = false; h.isMissed = false; });
            } else if (newCount > hitErrorCount) {
                const hitsToProcess = newCount - hitErrorCount;
                let snapTimeObj = null;

                for (let i = 0; i < hitsToProcess; i++) {
                    const error = hitErrors[hitErrorCount + i];
                    
                    let bestObj = null;
                    let bestStroke = null;
                    let minMismatch = Infinity;
                    
                    let unjudgedCandidates = hitObjects.filter(h => !h.judged).slice(0, 10);
                    
                    for (let obj of unjudgedCandidates) {
                        for (let j = keyStrokes.length - 1; j >= 0; j--) {
                            let stroke = keyStrokes[j];
                            if (stroke.matched) continue;

                            let calculatedError = stroke.startTime - obj.startTime;
                            let diff = Math.abs(calculatedError - error);
                            
                            if (diff < minMismatch) {
                                minMismatch = diff;
                                bestObj = obj;
                                bestStroke = stroke;
                            }
                        }
                        
                        let estimatedHitTime = lastPreciseTime - 20;
                        let estimatedObjStartTime = estimatedHitTime - error;
                        let timeDiff = Math.abs(obj.startTime - estimatedObjStartTime);
                        
                        if (timeDiff < minMismatch) {
                            minMismatch = timeDiff;
                            bestObj = obj;
                            bestStroke = null;
                        }
                    }

                    if (minMismatch > 150 && unjudgedCandidates.length > 0) {
                        bestObj = unjudgedCandidates[0];
                    }

                    if (bestObj) {
                        bestObj.judged = true;
                        bestObj.isMissed = false;
                        snapTimeObj = bestObj;

                        for (let obj of hitObjects) {
                            if (obj === bestObj) break;
                            if (!obj.judged) {
                                obj.judged = true;
                                if (!obj.isMissed) {
                                    obj.isMissed = true;
                                    ourDetectedMissCount++;
                                }
                            }
                        }

                        if (bestStroke) {
                                bestStroke.matched = true;

                                let wasMicrotap = bestStroke.endTime !== null && (bestStroke.endTime - bestStroke.startTime <= 2);
                                const trueHitTime = bestObj.startTime + error;
                                
                                if (bestStroke.startTime !== null) {
                                    bestStroke.startTime = trueHitTime;
                                }
                                
                                if (wasMicrotap && bestStroke.endTime !== null) {
                                    bestStroke.endTime = trueHitTime + 1;
                                } else if (bestStroke.endTime !== null && bestStroke.endTime <= trueHitTime) {
                                    bestStroke.endTime = trueHitTime + 1; 
                                }
                            }
                        }
                    }

                    if (!isTimelineLocked && snapTimeObj) {
                        lockedBaseTime = snapTimeObj.startTime - hitErrors[newCount - 1];
                        lockedBaseRealTime = now;
                        lockedCurrentSpeed = currentSpeed === 0 ? 1.0 : currentSpeed;
                        isTimelineLocked = true;
                    }
                    hitErrorCount = newCount;
                }
            }
        };
        wsPrecise.onclose = () => setTimeout(connect, 2000);
    }

    function resetTimelineState() {
        isTimelineLocked = false; hitErrorCount = 0; lastCommonLiveTime = 0;
        lastPreciseTime = 0; currentSpeed = 1.0; lockedBaseTime = 0;
        lastLiveTimeChangeReal = performance.now(); speedAccumTosu = 0; speedAccumReal = 0;
        
        keyStrokes = [];
        activeStrokes = { k1: null, k2: null, m1: null, m2: null };
        lastCounts = { k1: 0, k2: 0, m1: 0, m2: 0 };
        keyBoxStates = { k1: false, k2: false, m1: false, m2: false };
        if (hitObjects) hitObjects.forEach(h => { h.judged = false; h.isMissed = false; });

        lastCombo = 0;
        ourDetectedMissCount = 0;
    }

    // ──────── FIXED: SLIDER COMBO-BREAK DETECTION (long sliders now work) ────────
    // We no longer use a fixed 1000 ms start-time window.
    // Instead we take the most recent slider (current or previous) that is still
    // relevant at the moment the combo break packet arrives (within the normal
    // 100-200 ms poll delay).
    function markSliderAsMissed() {
        const now = lastPreciseTime || lastCommonLiveTime || 0;
        for (let i = hitObjects.length - 1; i >= 0; i--) {
            const note = hitObjects[i];
            if (note.type === 'slider' && !note.isMissed) {
                // Slider is either still active or ended no more than 500 ms ago
                // (covers the maximum expected combo-break packet delay)
                if (note.endTime >= now - 500 && note.startTime <= now + 300) {
                    note.isMissed = true;
                    break;
                }
            }
        }
    }

    async function fetchBeatmap() {
        try {
            const res = await fetch('http://127.0.0.1:24050/files/beatmap/file');
            const text = await res.text();
            const result = parseOsuFile(text);
            hitObjects = result.objs;
            timingPoints = result.timing;
            beatmapComboColors = result.beatmapCombos || [];
            beatmapOD = result.od;
            beatmapSliderTickRate = result.sliderTickRate || 1.0;
            loadTextures();
        } catch(e) { console.error(e); }
    }

    function parseOsuFile(osuText) {
        const lines = osuText.split('\n');
        let section = '', sliderMult = 1.0, timing = [], objs = [], beatmapComboColorsLocal = [], currentComboIndex = 0;
        let od = 8.0; 
        let sliderTickRate = 1.0;
        
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('[')) { section = line; continue; }
            if (section === '[Difficulty]') {
                if (line.startsWith('SliderMultiplier:')) sliderMult = parseFloat(line.split(':')[1]) || 1.0;
                if (line.startsWith('SliderTickRate:')) sliderTickRate = parseFloat(line.split(':')[1]) || 1.0;
                if (line.startsWith('OverallDifficulty:')) od = parseFloat(line.split(':')[1]) || 8.0;
            }
            if (section === '[Colours]' && line) {
                const match = line.match(/Combo\d+:\s*(\d+),\s*(\d+),\s*(\d+)/);
                if (match) beatmapComboColorsLocal.push({ r: parseInt(match[1]), g: parseInt(match[2]), b: parseInt(match[3]) });
            }
            if (section === '[TimingPoints]' && line) {
                const tp = line.split(',');
                if (tp.length >= 7) timing.push({ time: parseFloat(tp[0]), beatLength: parseFloat(tp[1]), uninherited: parseInt(tp[6]) === 1 });
            }
            if (section === '[HitObjects]' && line) {
                const parts = line.split(',');
                if (parts.length < 4) continue;
                const time = parseInt(parts[2]), type = parseInt(parts[3]);
                let noteType = 'circle', endTime = time;
                if (type & 4) currentComboIndex = (currentComboIndex + 1) % 8;
                if (type & 2) {
                    noteType = 'slider';
                    const slides = parseInt(parts[6]) || 1, length = parseFloat(parts[7]) || 0;
                    let currentBeatLength = 600, currentSV = sliderMult;
                    for (let tp of timing) {
                        if (tp.time > time) break;
                        if (tp.uninherited) currentBeatLength = tp.beatLength;
                        else currentSV = sliderMult * (-100 / (tp.beatLength || 1));
                    }
                    const duration = slides * length * currentBeatLength / (100 * currentSV);
                    endTime = time + (isFinite(duration) ? duration : 10000);
                } else if (type & 8) {
                    noteType = 'spinner';
                    endTime = parseInt(parts[5]) || time + 1000;
                }
                objs.push({ startTime: time, endTime, type: noteType, comboColorIndex: currentComboIndex, judged: false, isMissed: false });
            }
        }
        return { 
            objs: objs.sort((a,b)=>a.startTime-b.startTime), 
            timing, 
            beatmapCombos: beatmapComboColorsLocal, 
            od, 
            sliderTickRate
        };
    }

    // Function to load textures with fallback support for @2x and normal variants
    function loadTextures() {
        hasHitCircleTexture = false;
        hasSliderTickTexture = false;

        const tosuUrl = 'http://127.0.0.1:24050/files/skin/';
        
        // Helper function to load an image with fallback support
        function loadImageWithFallback(image, src, fallbackSrc) {
            image.onload = () => { 
                // If we loaded a normal (non-@2x) texture, upscale it to 2x resolution without blurring
                if (!src.includes('@2x')) {
                    upscaleTextureTo2x(image);
                }
                hasHitCircleTexture = true; 
                createTintedVersions(); 
            };
            image.onerror = () => {
                // If @2x fails, try normal variant
                if (src.includes('@2x')) {
                    image.src = fallbackSrc;
                } else {
                    // If normal variant also fails, reset to default
                    image.src = '';
                }
            };
            image.src = src;
        }

        // Helper function to upscale texture to 2x resolution without blurring
        function upscaleTextureTo2x(image) {
            // Create a canvas to upscale the image
            const canvas = document.createElement('canvas');
            canvas.width = image.width * 2;
            canvas.height = image.height * 2;
            
            const ctx = canvas.getContext('2d');
            // Disable image smoothing to maintain pixel-perfect quality
            ctx.imageSmoothingEnabled = false;
            
            // Draw the image at 2x scale
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
            
            // Replace the original image with the upscaled version
            image.src = canvas.toDataURL();
            image.width = canvas.width;
            image.height = canvas.height;
        }

        // Load hit circle textures with fallback support
        hitCircleImg = new Image(); 
        hitCircleOverlayImg = new Image();
        
        // Try @2x first, then fallback to normal
        loadImageWithFallback(hitCircleImg, tosuUrl + 'hitcircle@2x.png', tosuUrl + 'hitcircle.png');
        loadImageWithFallback(hitCircleOverlayImg, tosuUrl + 'hitcircleoverlay@2x.png', tosuUrl + 'hitcircleoverlay.png');

        // Load slider tick textures with fallback support
        sliderTickImg = new Image();
        loadImageWithFallback(sliderTickImg, tosuUrl + 'sliderscorepoint@2x.png', tosuUrl + 'sliderscorepoint.png');
    }

    function createTintedVersions() {
        if (hitCircleImg.complete) {
            defaultTintedHitCircles = DEFAULT_COMBO_COLORS.map(c => tintImage(hitCircleImg, `rgb(${c.r},${c.g},${c.b})`));
            if (beatmapComboColors.length) beatmapTintedHitCircles = beatmapComboColors.map(c => tintImage(hitCircleImg, `rgb(${c.r},${c.g},${c.b})`));
        }
        
        if (sliderTickImg && sliderTickImg.complete) {
            defaultTintedSliderTicks = DEFAULT_COMBO_COLORS.map(c => tintImage(sliderTickImg, `rgb(${c.r},${c.g},${c.b})`));
            if (beatmapComboColors.length) beatmapTintedSliderTicks = beatmapComboColors.map(c => tintImage(sliderTickImg, `rgb(${c.r},${c.g},${c.b})`));
        }
    }

    function tintImage(baseImg, color) {
        const c = document.createElement('canvas'); c.width = baseImg.width; c.height = baseImg.height;
        const ct = c.getContext('2d'); ct.drawImage(baseImg, 0, 0);
        ct.globalCompositeOperation = 'source-atop'; ct.fillStyle = color; ct.fillRect(0, 0, c.width, c.height);
        return c;
    }

    function drawHitCircle(posX, colorIndex, isMissed = false) {
        if (posX < -100 || posX > canvas.width + 100) return;
        
        ctx.globalAlpha = isMissed ? 0.4 : 1.0;

        if (isMissed && hasHitCircleTexture && hitCircleImg) {
            const w = hitCircleImg.width * TEXTURE_SCALE, h = hitCircleImg.height * TEXTURE_SCALE;
            const dx = posX - w/2, dy = CIRCLE_Y - h/2;
            ctx.drawImage(hitCircleImg, dx, dy, w, h);
            if (hitCircleOverlayImg && hitCircleOverlayImg.complete) ctx.drawImage(hitCircleOverlayImg, dx, dy, w, h);
            ctx.globalAlpha = 1.0;
            return;
        }

        const activeTinted = (useBeatmapCombos && beatmapTintedHitCircles.length > 0) ? beatmapTintedHitCircles : defaultTintedHitCircles;
        const tintedCanvas = activeTinted[colorIndex % activeTinted.length];
        if (hasHitCircleTexture && tintedCanvas) {
            const w = tintedCanvas.width * TEXTURE_SCALE, h = tintedCanvas.height * TEXTURE_SCALE;
            const dx = posX - w/2, dy = CIRCLE_Y - h/2;
            ctx.drawImage(tintedCanvas, dx, dy, w, h);
            if (hitCircleOverlayImg && hitCircleOverlayImg.complete) ctx.drawImage(hitCircleOverlayImg, dx, dy, w, h);
        } else {
            if (isMissed) {
                ctx.fillStyle = `rgba(100, 100, 100, 0.5)`;
            } else {
                const col = (useBeatmapCombos && beatmapComboColors.length ? beatmapComboColors : DEFAULT_COMBO_COLORS)[colorIndex % 4];
                ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
            }
            ctx.beginPath(); ctx.arc(posX, CIRCLE_Y, 10, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1.0;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const now = performance.now();
        if (now - lastReceiveTime > 1000) { currentSpeed = 0; isTimelineLocked = false; }
        if (gameStateName !== 'play' && gameStateName !== 'pause') { requestAnimationFrame(draw); return; }

        let currentTime = isTimelineLocked 
            ? lockedBaseTime + (now - lockedBaseRealTime) * lockedCurrentSpeed * SPEED_MULTIPLIER 
            : lastCommonLiveTime || 0;

        const pastMs = playheadX / scale + 200;
        const futureMs = (canvas.width - playheadX) / scale + 200;

        const cleanupThreshold = currentTime - pastMs - 5000;
        while (keyStrokes.length > 0 && (keyStrokes[0].endTime !== null && keyStrokes[0].endTime < cleanupThreshold)) {
            keyStrokes.shift();
        }

        const hitWindow50 = 199.5 - (beatmapOD * 6);
        const tosuLeeway = 350; 
        const hitErrorLeeway = 150;

        for (let note of hitObjects) {
            if (!note.judged) {
                const tooLateTime = note.endTime + hitWindow50;
                if (currentTime > tooLateTime + tosuLeeway) {
                    note.judged = true;
                    if (!note.isMissed) {
                        note.isMissed = true;
                        ourDetectedMissCount++;
                    }
                }
            }
        }

        let firstUnjudgedIndex = hitObjects.findIndex(h => !h.judged);
        for (let stroke of keyStrokes) {
            if (!stroke.matched && currentTime > stroke.startTime + hitErrorLeeway) {
                if (firstUnjudgedIndex !== -1) {
                    let nextNote = hitObjects[firstUnjudgedIndex];
                    let minHitTime = nextNote.startTime - hitWindow50;
                    let maxHitTime = nextNote.startTime + hitWindow50;
                    
                    if (stroke.startTime >= minHitTime && stroke.startTime <= maxHitTime) {
                        nextNote.judged = true;
                        if (!nextNote.isMissed) {
                            nextNote.isMissed = true;
                            ourDetectedMissCount++;
                        }
                        stroke.matched = true;
                        
                        while (firstUnjudgedIndex < hitObjects.length && hitObjects[firstUnjudgedIndex].judged) {
                            firstUnjudgedIndex++;
                        }
                        if (firstUnjudgedIndex >= hitObjects.length) firstUnjudgedIndex = -1;
                    } else if (stroke.startTime < minHitTime) {
                        stroke.matched = true;
                    }
                } else {
                    stroke.matched = true;
                }
            }
        }

        if (timingPoints.length > 0) {
            let activeTP = timingPoints[0];
            for (let tp of timingPoints) { if (tp.uninherited && tp.time <= currentTime + futureMs) activeTP = tp; else if (tp.time > currentTime + futureMs) break; }
            const bl = activeTP.beatLength;
            if (bl > 1 && isFinite(bl)) {
                let t = Math.floor(((currentTime - pastMs) - activeTP.time) / bl) * bl + activeTP.time;
                while (t < currentTime + futureMs + bl) {
                    const x = playheadX + (t - currentTime) * scale;
                    if (x >= 0 && x <= canvas.width) {
                        const isBig = Math.round((t - activeTP.time) / bl) % 4 === 0;
                        ctx.beginPath(); ctx.strokeStyle = isBig ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.05)';;
                        ctx.lineWidth = isBig ? 2 : 1; ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
                    }
                    t += bl;
                }
            }
        }

        for (let note of hitObjects) {
            if (note.endTime < currentTime - pastMs || note.startTime > currentTime + futureMs) continue;
            
            const xStart = playheadX + (note.startTime - currentTime) * scale;
            const xEnd   = playheadX + (note.endTime - currentTime) * scale;
            let alpha = xEnd < 100 ? Math.max(0, xEnd / 100) : 1;
            ctx.globalAlpha = Math.max(0.1, alpha);

            const col = ((useBeatmapCombos && beatmapComboColors.length > 0) ? beatmapComboColors : DEFAULT_COMBO_COLORS)[note.comboColorIndex % (useBeatmapCombos && beatmapComboColors.length ? beatmapComboColors.length : 4)];

            if (note.type === 'slider') {
                let trackDiam = hasHitCircleTexture && hitCircleImg ? hitCircleImg.height * TEXTURE_SCALE * 0.95 : 20;
                const styles = getSliderStyles(COLORIZE_SLIDER_BODY ? [col.r, col.g, col.b] : sliderTrackOverride, sliderBorder, note.isMissed);
                const sw = Math.abs(xEnd - xStart) + trackDiam * 2;
                
                if (sliderBuffer.width < sw || sliderBuffer.height < trackDiam * 2) {
                    sliderBuffer.width = sw; sliderBuffer.height = trackDiam * 2;
                }
                sctx.clearRect(0, 0, sw, trackDiam * 2);

                const sP = {x: trackDiam, y: trackDiam}, eP = {x: sw - trackDiam, y: trackDiam};
                sctx.lineCap = 'round'; sctx.lineWidth = trackDiam; sctx.strokeStyle = styles.border;
                sctx.beginPath(); sctx.moveTo(sP.x, sP.y); sctx.lineTo(eP.x, eP.y); sctx.stroke();
                sctx.globalCompositeOperation = 'destination-out';
                sctx.lineWidth = trackDiam * 0.8; sctx.stroke();
                sctx.globalCompositeOperation = 'destination-over';
                sctx.globalAlpha = styles.alpha;
                const grad = sctx.createLinearGradient(0, sP.y - trackDiam*0.5, 0, sP.y + trackDiam*0.5);
                grad.addColorStop(0, `rgb(${styles.trackBaseRgb})`); grad.addColorStop(0.5, `rgb(${styles.trackHighlightRgb})`); grad.addColorStop(1, `rgb(${styles.trackBaseRgb})`);
                sctx.strokeStyle = grad; sctx.lineWidth = trackDiam * 0.8;
                sctx.beginPath(); sctx.moveTo(sP.x, sP.y); sctx.lineTo(eP.x, eP.y); sctx.stroke();
                
                sctx.globalAlpha = 1; sctx.globalCompositeOperation = 'source-over';
                ctx.drawImage(sliderBuffer, 0, 0, sw, trackDiam * 2, xStart - trackDiam, SLIDER_Y - trackDiam, sw, trackDiam * 2);

                let currentBeatLength = 600;
                for (let tp of timingPoints) {
                    if (tp.time > note.startTime) break;
                    if (tp.uninherited) currentBeatLength = tp.beatLength;
                }
                const tickDelta = currentBeatLength / beatmapSliderTickRate;
                if (tickDelta > 10 && isFinite(tickDelta)) {
                    let tickTime = note.startTime + tickDelta;
                    const lastPossible = note.endTime - 36;
                    const sliderDuration = note.endTime - note.startTime;

                    while (tickTime < lastPossible) {
                        const frac = (tickTime - note.startTime) / sliderDuration;
                        if (frac >= 1) break;
                        const tickX = xStart + frac * (xEnd - xStart);

                        let tickCanvas = null;
                        if (note.isMissed && hasSliderTickTexture) {
                            tickCanvas = sliderTickImg;
                        } else if (hasSliderTickTexture) {
                            const activeTinted = (useBeatmapCombos && beatmapTintedSliderTicks.length > 0) ? beatmapTintedSliderTicks : defaultTintedSliderTicks;
                            tickCanvas = activeTinted[note.comboColorIndex % activeTinted.length];
                        }

                        if (tickCanvas) {
                            const tickScaleFactor = TEXTURE_SCALE * 0.65;
                            const tickW = tickCanvas.width * tickScaleFactor;
                            const tickH = tickCanvas.height * tickScaleFactor;
                            ctx.drawImage(tickCanvas, tickX - tickW / 2, SLIDER_Y - tickH / 2, tickW, tickH);
                        } else {
                            ctx.fillStyle = note.isMissed ? `rgba(100,100,100,0.5)` : `rgb(${col.r},${col.g},${col.b})`;
                            ctx.beginPath();
                            ctx.arc(tickX, SLIDER_Y, 5.5, 0, Math.PI * 2);
                            ctx.fill();
                        }

                        tickTime += tickDelta;
                    }
                }
            } else if (note.type === 'spinner') {
                ctx.fillStyle = note.isMissed ? `rgba(100,100,100,0.3)` : `rgba(${col.r},${col.g},${col.b},0.6)`;
                ctx.fillRect(xStart, SPINNER_Y - SPINNER_BAR_HEIGHT/2, xEnd - xStart, SPINNER_BAR_HEIGHT);
            }

            if (note.type === 'circle' || note.type === 'slider') {
                drawHitCircle(xStart, note.comboColorIndex, note.isMissed);
            }
            ctx.globalAlpha = 1;
        }

        ctx.lineWidth = KEY_LINE_THICKNESS;
        ctx.lineCap = 'round';
        const gap = 4;
        const radius = KEY_LINE_THICKNESS / 2;
        const maxLineX = playheadX - gap - radius; 

        for (let stroke of keyStrokes) {
            let sTime = stroke.startTime || currentTime;
            let eTime = stroke.endTime !== null ? stroke.endTime : currentTime;
            
            if (eTime < currentTime - pastMs) continue;
            if (sTime > currentTime + futureMs) continue;

            let xStart = playheadX + (sTime - currentTime) * scale;
            let xEnd = playheadX + (eTime - currentTime) * scale;

            let lane = (stroke.key === 'k1' || stroke.key === 'm1') ? 0 : 1;
            let y = KEY_BOX_Y_CENTERED - (KEY_BOX_SPACING / 2) + (lane * KEY_BOX_SPACING);

            let drawXStart = Math.min(xStart, maxLineX);
            let drawXEnd = Math.min(xEnd, maxLineX);

            if (drawXStart >= drawXEnd) drawXStart = drawXEnd - 0.1; 

            ctx.strokeStyle = lane === 0 ? 'rgba(255, 105, 180, 0.8)' : 'rgba(0, 255, 255, 0.8)';
            ctx.beginPath(); ctx.moveTo(drawXStart, y); ctx.lineTo(drawXEnd, y); ctx.stroke();
        }

        for (let lane = 0; lane < 2; lane++) {
            let isDown = false;
            if (lane === 0 && (keyBoxStates['k1'] || keyBoxStates['m1'])) isDown = true;
            if (lane === 1 && (keyBoxStates['k2'] || keyBoxStates['m2'])) isDown = true;

            let y = KEY_BOX_Y_CENTERED - (KEY_BOX_SPACING / 2) + (lane * KEY_BOX_SPACING);
            let size = KEY_BOX_SIZE;
            let boxX = playheadX;
            let boxY = y - size / 2;

            ctx.fillStyle = isDown ? (lane === 0 ? 'rgba(255, 105, 180, 1)' : 'rgba(0, 255, 255, 1)') : 'rgba(40, 40, 40, 0.8)';
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.lineWidth = 2; ctx.lineCap = 'butt'; 
            ctx.fillRect(boxX, boxY, size, size);
            ctx.strokeRect(boxX, boxY, size, size);
        }

        ctx.strokeStyle = '#0ff'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(playheadX, PLAYHEAD_Y_START); ctx.lineTo(playheadX, PLAYHEAD_Y_END); ctx.stroke();
        ctx.fillStyle = '#0ff';
        
        // New title display logic
        let titleLines = [];
        const canvasHeight = canvas.height;
        const canvasWidth = canvas.width;
        
        // Set initial font size to 80% of canvas height
        let fontSize = canvasHeight * 0.8;
        
        // Limit text width to 30% of canvas width
        const maxWidth = canvasWidth * 0.3;
        
        // Check if title fits within max width at current font size
        ctx.font = `bold ${fontSize}px Arial`;
        const textWidth = ctx.measureText(mapTitle).width;
        
        // If title doesn't fit, reduce font size until it fits or reaches minimum
        if (textWidth > maxWidth) {
            // Calculate minimum font size (80% canvas height / 2)
            const minFontSize = (canvasHeight * 0.8) / 2;
            
            // Reduce font size until it fits or reaches minimum
            while (fontSize > minFontSize && textWidth > maxWidth) {
                fontSize -= 1;
                ctx.font = `bold ${fontSize}px Arial`;
                const newWidth = ctx.measureText(mapTitle).width;
                if (newWidth <= maxWidth) {
                    break;
                }
            }
            
            // If we still exceed max width, split into multiple lines
            if (textWidth > maxWidth) {
                // Split title into lines that fit within max width
                let remainingTitle = mapTitle;
                let lineCount = 0;
                
                while (remainingTitle.length > 0 && lineCount < 20) { // Prevent infinite loop
                    // Try to find a good break point
                    let breakPoint = remainingTitle.length;
                    
                    // Try to break at space character if possible
                    let spaceIndex = remainingTitle.lastIndexOf(' ', maxWidth / (fontSize * 0.6)); // Approximate max chars per line
                    if (spaceIndex !== -1 && spaceIndex > 0) {
                        breakPoint = spaceIndex;
                    } else {
                        // If no space found, break at approximate character count
                        breakPoint = Math.floor(maxWidth / (fontSize * 0.6));
                    }
                    
                    // Make sure we don't break in the middle of a word
                    if (breakPoint < remainingTitle.length && breakPoint > 0) {
                        // If we're not at a space, move back to the last space
                        if (remainingTitle[breakPoint] !== ' ' && breakPoint > 0) {
                            let lastSpace = remainingTitle.lastIndexOf(' ', breakPoint);
                            if (lastSpace !== -1) {
                                breakPoint = lastSpace;
                            }
                        }
                    }
                    
                    if (breakPoint <= 0) breakPoint = remainingTitle.length;
                    
                    titleLines.push(remainingTitle.substring(0, breakPoint).trim());
                    remainingTitle = remainingTitle.substring(breakPoint).trim();
                    lineCount++;
                }
                
                // If we have multiple lines, adjust font size to fit
                if (titleLines.length > 1) {
                    // Calculate new font size based on number of lines
                    const newFontSize = (canvasHeight * 0.8) / titleLines.length;
                    fontSize = newFontSize;
                    
                    // Ensure font size doesn't go below minimum
                    if (fontSize < minFontSize) {
                        fontSize = minFontSize;
                    }
                }
            }
        } else {
            titleLines = [mapTitle];
        }
        
        ctx.font = `bold ${fontSize}px Arial`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        
        const totalHeight = titleLines.length * fontSize * 1.2;
        const startY = TITLE_Y - (totalHeight / 2) + fontSize * 0.6;
        
        for (let i = 0; i < titleLines.length; i++) {
            ctx.fillText(titleLines[i], 15, startY + (i * fontSize * 1.2));
        }
        
        ctx.shadowBlur = 0;
        ctx.font = '14px Arial';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText(`${(currentTime/1000).toFixed(2)}s | Speed: ${currentSpeed.toFixed(2)}x | ${isTimelineLocked ? 'LOCKED ✓' : 'syncing'}`, 15, 95);

        if (SHOW_DEBUG_PANEL) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(canvas.width - 300, 0, 300, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = '14px Arial';
            ctx.fillText('DEBUG PANEL', canvas.width - 290, 25);
            let y = 45;
            ctx.fillText(`Game State: ${gameStateName}`, canvas.width - 290, y); y += 20;
            ctx.fillText(`Key States:`, canvas.width - 290, y); y += 20;
            for (const key in keyBoxStates) {
                ctx.fillText(`${key}: ${keyBoxStates[key] ? 'DOWN' : 'UP'}`, canvas.width - 290, y);
                y += 20;
            }
            ctx.fillText(`Active Strokes:`, canvas.width - 290, y); y += 20;
            for (const key in activeStrokes) {
                const stroke = activeStrokes[key];
                ctx.fillText(`${key}: ${stroke ? 'ACTIVE' : 'INACTIVE'}`, canvas.width - 290, y);
                y += 20;
            }
            ctx.fillText(`Key Strokes Count: ${keyStrokes.length}`, canvas.width - 290, y); y += 20;
            if (keyStrokes.length > 0) {
                ctx.fillText(`Last Stroke:`, canvas.width - 290, y); y += 20;
                const lastStroke = keyStrokes[keyStrokes.length - 1];
                ctx.fillText(`  Key: ${lastStroke.key}`, canvas.width - 290, y); y += 20;
                ctx.fillText(`  Start: ${lastStroke.startTime}`, canvas.width - 290, y); y += 20;
                ctx.fillText(`  End: ${lastStroke.endTime !== null ? lastStroke.endTime : 'ACTIVE'}`, canvas.width - 290, y);
            }
        }

        requestAnimationFrame(draw);
    }

    connect();
    requestAnimationFrame(draw);
</script></body>
</html>
